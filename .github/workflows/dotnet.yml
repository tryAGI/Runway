name: Publish
on:
  push:
    branches:
      - main
    tags:
      - v**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    uses: tryAGI/workflows/.github/workflows/dotnet-sdk-build-test-publish.yml@main
    with:
      dotnet-version: 10.0.x
      enable-caching: false
      additional-test-arguments: '--logger GitHubActions'
    secrets:
      nuget-key: ${{ secrets.NUGET_API_KEY || secrets.NUGET_KEY }}
  
  trim-check:
    name: Trimming Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Install AutoSDK CLI
        run: dotnet tool install --global autosdk.cli --prerelease

      - name: Run trimming check
        run: autosdk trim src/libs/Runway/Runway.csproj

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build CLI
        run: dotnet build src/cli/Runway.Cli/Runway.Cli.csproj -c Release

      - name: Smoke dnx package
        run: dotnet dnx Runway.Cli --source "$PWD/src/cli/Runway.Cli/bin/Release" --prerelease --yes models

      - name: Smoke root help
        run: dotnet run --project src/cli/Runway.Cli -c Release --no-build -- --help

      - name: Smoke model inventory
        run: dotnet run --project src/cli/Runway.Cli -c Release --no-build -- models

      - name: Smoke short-video plan
        run: dotnet run --project src/cli/Runway.Cli -c Release --no-build -- short-video "tiny robot finds a glowing garden" --shots 2 --plan-only --planner deterministic

      - name: Smoke short-video edited-plan help
        run: dotnet run --project src/cli/Runway.Cli -c Release --no-build -- short-video run --help

      - name: Smoke product photoshoot plan
        run: dotnet run --project src/cli/Runway.Cli -c Release --no-build -- product-photoshoot create --prompt "transparent speaker" --mode product_shot --plan-only

      - name: Smoke marketplace cards plan
        run: dotnet run --project src/cli/Runway.Cli -c Release --no-build -- marketplace-cards create --prompt "compact travel kettle" --scope main --plan-only

      - name: Smoke ad-video plan
        run: dotnet run --project src/cli/Runway.Cli -c Release --no-build -- ad-video create --prompt "hands-free camera strap" --mode ugc --shots 1 --plan-only

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        run: gh release create ${{ github.ref_name }}
          --title "${{ github.ref_name }}"
          --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
